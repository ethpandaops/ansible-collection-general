- name: Validate consensus command conflict guards
  hosts: localhost
  connection: local
  gather_facts: false
  collections:
    - ethpandaops.general
  vars:
    validation_conflicting_fee_recipient: "0x0000000000000000000000000000000000000001"
    validation_scenarios:
      grandine:
        defaults_file: "{{ playbook_dir }}/../../roles/grandine/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/grandine/tasks/validations.yaml"
        beacon:
          expected_flag: --builder-url
          extra_args_var: grandine_container_command_extra_args
          extra_args:
            - --builder-url=http://other-relay:18550
          extra_vars:
            grandine_mev_boost_enabled: true
        validator:
          expected_flag: --suggested-fee-recipient
          enabled_var: grandine_validator_enabled
          extra_args_var: grandine_container_command_extra_args
          extra_args:
            - --suggested-fee-recipient={{ validation_conflicting_fee_recipient }}
      lighthouse:
        defaults_file: "{{ playbook_dir }}/../../roles/lighthouse/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/lighthouse/tasks/validations.yaml"
        beacon:
          expected_flag: --http-port
          extra_args_var: lighthouse_container_command_extra_args
          extra_args:
            - --http-port=9999
        validator:
          expected_flag: --suggested-fee-recipient
          enabled_var: lighthouse_validator_enabled
          extra_args_var: lighthouse_validator_container_command_extra_args
          extra_args:
            - --suggested-fee-recipient={{ validation_conflicting_fee_recipient }}
      lodestar:
        defaults_file: "{{ playbook_dir }}/../../roles/lodestar/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/lodestar/tasks/validations.yaml"
        beacon:
          expected_flag: --rest.port
          extra_args_var: lodestar_container_command_extra_args
          extra_args:
            - --rest.port=9999
        validator:
          expected_flag: --suggestedFeeRecipient
          enabled_var: lodestar_validator_enabled
          extra_args_var: lodestar_validator_container_command_extra_args
          extra_args:
            - --suggestedFeeRecipient={{ validation_conflicting_fee_recipient }}
      nimbus:
        defaults_file: "{{ playbook_dir }}/../../roles/nimbus/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/nimbus/tasks/validations.yaml"
        beacon:
          expected_flag: --rest-port
          extra_args_var: nimbus_container_command_extra_args
          extra_args:
            - --rest-port=9999
        validator:
          expected_flag: --suggested-fee-recipient
          enabled_var: nimbus_validator_enabled
          extra_args_var: nimbus_validator_container_command_extra_args
          extra_args:
            - --suggested-fee-recipient={{ validation_conflicting_fee_recipient }}
      prysm:
        defaults_file: "{{ playbook_dir }}/../../roles/prysm/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/prysm/tasks/validations.yaml"
        beacon:
          expected_flag: --http-port
          extra_args_var: prysm_container_command_extra_args
          extra_args:
            - --http-port=9999
        validator:
          expected_flag: --suggested-fee-recipient
          enabled_var: prysm_validator_enabled
          extra_args_var: prysm_validator_container_command_extra_args
          extra_args:
            - --suggested-fee-recipient={{ validation_conflicting_fee_recipient }}
      teku:
        defaults_file: "{{ playbook_dir }}/../../roles/teku/defaults/main.yaml"
        tasks_file: "{{ playbook_dir }}/../../roles/teku/tasks/validations.yaml"
        beacon:
          expected_flag: --rest-api-port
          extra_args_var: teku_container_command_extra_args
          extra_args:
            - --rest-api-port=9999
        validator:
          expected_flag: --validators-proposer-default-fee-recipient
          enabled_var: teku_validator_enabled
          extra_args_var: teku_validator_container_command_extra_args
          extra_args:
            - --validators-proposer-default-fee-recipient={{ validation_conflicting_fee_recipient }}
  tasks:
    - name: Assert selected consensus client is supported
      ansible.builtin.assert:
        that:
          - consensus_client is defined
          - consensus_client in validation_scenarios
        fail_msg: "Unsupported consensus_client '{{ consensus_client | default('') }}'"

    - name: Select validation scenario
      ansible.builtin.set_fact:
        validation_scenario: "{{ validation_scenarios[consensus_client] }}"

    - name: Verify conflicting beacon args are rejected
      ansible.builtin.include_tasks: tasks/expect_validation_failure.yml
      vars:
        validation_defaults_file: "{{ validation_scenario.defaults_file }}"
        validation_tasks_file: "{{ validation_scenario.tasks_file }}"
        validation_result_var: beacon_validation_failure
        validation_unexpected_success_msg: "Consensus client accepted conflicting beacon extra args"
        validation_var_items: >-
          {{
            {
              validation_scenario.beacon.extra_args_var:
                validation_scenario.beacon.extra_args
            }
            | combine(validation_scenario.beacon.extra_vars | default({}))
            | dict2items
          }}

    - name: Assert beacon conflict was rejected
      ansible.builtin.assert:
        that:
          - beacon_validation_failure is defined
          - beacon_validation_failure.msg is search('managed flags')
          - beacon_validation_failure.msg is search(validation_scenario.beacon.expected_flag)

    - name: Verify conflicting validator args are rejected
      ansible.builtin.include_tasks: tasks/expect_validation_failure.yml
      vars:
        validation_defaults_file: "{{ validation_scenario.defaults_file }}"
        validation_tasks_file: "{{ validation_scenario.tasks_file }}"
        validation_result_var: validator_validation_failure
        validation_unexpected_success_msg: "Consensus client accepted conflicting validator extra args"
        validation_var_items: >-
          {{
            {
              validation_scenario.validator.enabled_var: true,
              validation_scenario.validator.extra_args_var:
                validation_scenario.validator.extra_args
            }
            | combine(validation_scenario.validator.extra_vars | default({}))
            | dict2items
          }}

    - name: Assert validator conflict was rejected
      ansible.builtin.assert:
        that:
          - validator_validation_failure is defined
          - validator_validation_failure.msg is search('managed flags')
          - validator_validation_failure.msg is search(validation_scenario.validator.expected_flag)
