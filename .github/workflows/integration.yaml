name: Integration
on:
  pull_request:
  push:
    branches:
      - master

defaults:
  run:
    working-directory: ansible_collections/ethpandaops/general

jobs:
  # Job for change detection
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      roles: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            shared:
              - .github/actions/setup/**
              - .github/workflows/integration.yaml
              - playbooks/molecule/**
              - plugins/filter/**
              - requirements.*
              - requirements.yaml
            blockscout: roles/blockscout/**
            bootstrap: roles/bootstrap/**
            hive: roles/hive/**
            mev_boost: roles/mev_boost/**
            mev_rs: roles/mev_rs/**

  vars:
    runs-on: ubuntu-latest
    needs: changes
    outputs:
      roles: ${{ steps.vars.outputs.roles }}
    steps:
      - name: Set roles matrix
        id: vars
        working-directory: .
        run: |
          ALL_ROLES='["blockscout", "bootstrap", "hive", "mev_boost", "mev_rs"]'

          if [[ "${{ needs.changes.outputs.shared }}" == "true" ]]; then
            ROLES=$ALL_ROLES
          else
            ROLES='${{ needs.changes.outputs.roles }}'
          fi

          echo "roles=$ROLES" >> "$GITHUB_OUTPUT"

  # Integration test using molecule
  job:
    needs: [changes, vars]
    concurrency:
      group: ${{ github.head_ref }}-${{ matrix.role }}
      cancel-in-progress: true
    if: ${{ needs.vars.outputs.roles != '' && toJson(fromJson(needs.vars.outputs.roles)) != '[]' }}
    strategy:
      matrix:
        role: ${{ fromJSON(needs.vars.outputs.roles) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ansible_collections/ethpandaops/general

      - uses: ./ansible_collections/ethpandaops/general/.github/actions/setup
        with:
          dockerhub_username: ethpandaops
          dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: ethpandaops/actions/docker-login@a91b7a8dd6a264f5e845ac2aa52d2d6f24e6d01d
        with:
          username: ethpandaops
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run molecule
        working-directory: ansible_collections/ethpandaops/general/roles/${{ matrix.role }}
        run: molecule test
        env:
          PY_COLORS: '1'
          DOCKERHUB_USERNAME: ethpandaops
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
