all:
  children:
    molecule:
      hosts:
        blockscout:
          ansible_connection: containers.podman.podman
          container_image: docker.io/geerlingguy/docker-debian13-ansible:latest

          container_privileged: true
          container_systemd: true
          container_volumes:
            - /sys/fs/cgroup:/sys/fs/cgroup:rw
