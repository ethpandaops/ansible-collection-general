- name: Validate lighthouse beacon extra args
  vars:
    lighthouse_reserved_flag_keys: >-
      {{
        (
          lighthouse_container_command_default +
          lighthouse_container_command_v6 +
          lighthouse_container_supernode_command +
          lighthouse_container_command_checkpoint_args +
          lighthouse_mev_boost_beacon_command
        ) | ethpandaops.general.command_flag_keys(lighthouse_container_command_pair_flags)
      }}
    lighthouse_container_conflicting_flags: >-
      {{
        lighthouse_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          lighthouse_container_command +
          (lighthouse_checkpoint_sync_enabled | ternary(lighthouse_container_command_checkpoint_args, [])) +
          (lighthouse_mev_boost_enabled | ternary(lighthouse_mev_boost_beacon_command, [])),
          lighthouse_container_command_pair_flags,
          lighthouse_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - lighthouse_container_conflicting_flags | length == 0
    fail_msg: >-
      lighthouse_container_command_extra_args redefines managed flags:
      {{ lighthouse_container_conflicting_flags | join(', ') }}.
      Configure these through lighthouse role variables instead of re-adding them in extra args.

- name: Validate lighthouse validator extra args
  when: lighthouse_validator_enabled
  vars:
    lighthouse_validator_reserved_flag_keys: >-
      {{
        (
          lighthouse_validator_container_command +
          lighthouse_mev_boost_validator_command
        ) | ethpandaops.general.command_flag_keys(lighthouse_validator_container_command_pair_flags)
      }}
    lighthouse_validator_conflicting_flags: >-
      {{
        lighthouse_validator_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          lighthouse_validator_container_command +
          (lighthouse_mev_boost_enabled | ternary(lighthouse_mev_boost_validator_command, [])),
          lighthouse_validator_container_command_pair_flags,
          lighthouse_validator_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - lighthouse_validator_conflicting_flags | length == 0
    fail_msg: >-
      lighthouse validator extra args redefine managed flags:
      {{ lighthouse_validator_conflicting_flags | join(', ') }}.
      Configure these through lighthouse validator vars instead of re-adding them in extra args.
