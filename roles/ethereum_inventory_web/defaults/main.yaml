eth_inventory_web_dir: /data/eth-inventory-web # noqa var-naming[no-role-prefix]

eth_inventory_web_container_image: nginx:alpine # noqa var-naming[no-role-prefix]
eth_inventory_web_container_name: eth-inventory-web # noqa var-naming[no-role-prefix]
eth_inventory_web_container_published_ports: [] # noqa var-naming[no-role-prefix]
eth_inventory_web_container_restart_policy: always # noqa var-naming[no-role-prefix]
eth_inventory_web_container_networks_cli_compatible: true # noqa var-naming[no-role-prefix]
eth_inventory_web_container_network_mode: default # noqa var-naming[no-role-prefix]
eth_inventory_web_container_networks: [] # noqa var-naming[no-role-prefix]
eth_inventory_web_container_env: {} # noqa var-naming[no-role-prefix]
eth_inventory_web_container_volumes_from: [] # noqa var-naming[no-role-prefix]
eth_inventory_web_container_volumes: # noqa var-naming[no-role-prefix]
  - "{{ eth_inventory_web_dir }}/content:/usr/share/nginx/html:ro"
  - "{{ eth_inventory_web_dir }}/nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro"

# Optional validator names mapping file produced by the genesis generator when
# validator shuffling is enabled. Defaults to the network config metadata
# directory (empty when that is unknown, which disables mapping translation).
eth_inventory_web_validator_names_file: >- # noqa var-naming[no-role-prefix]
  {{ ((eth_testnet_config_local_dir_src | regex_replace('/$', '')) ~ '/validator_names.yaml')
     if eth_testnet_config_local_dir_src is defined else '' }}

# Genesis generator image carrying the shared validator-mapping merge script
# (/apps/validator-mapping/merge.sh). The merge runs in this image so the
# translation logic is shared with the ethereum-package rather than reimplemented.
eth_inventory_web_merge_image: >- # noqa var-naming[no-role-prefix]
  {{ ethereum_genesis_generator_container_image | default('ethpandaops/ethereum-genesis-generator:latest') }}

# Client/host key segments fed to the merge script: the inclusive mnemonic
# key-index range each host owns, derived from ethereum_genesis_validator_keyranges
# (whose end index is exclusive).
eth_inventory_web_segments_json: >- # noqa var-naming[no-role-prefix]
  {%- set segs = [] -%}
  {%- for host, kr in (ethereum_genesis_validator_keyranges | default({})).items() -%}
  {%-   set _ = segs.append({'name': host, 'start': kr.start | int, 'end': (kr.end | int) - 1}) -%}
  {%- endfor -%}
  {{ segs | to_json }}

# Final on-chain validator ranges ({ "<start>-<end>": "<name>" }). Computed at
# run time by the shared merge script (see tasks/main.yaml); empty until then.
eth_inventory_web_validator_ranges: {} # noqa var-naming[no-role-prefix]

# Assignment history: list of { effective_from: <unix seconds>, ranges: {...} }
# snapshots, accrued at run time by diffing against the previously published
# file (see tasks/main.yaml). effective_from 0 means "since genesis". Consumed
# by dora to resolve validator names at historical slots.
eth_inventory_web_validator_ranges_history: [] # noqa var-naming[no-role-prefix]

eth_inventory_web_content: # noqa var-naming[no-role-prefix]
  - file: v1/validator-ranges.json
    content: |
      {{ {'ranges': eth_inventory_web_validator_ranges,
          'history': eth_inventory_web_validator_ranges_history} | to_nice_json }}
    when: ethereum_genesis_validator_keyranges is defined
  - file: v1/inventory.json
    content: |
      {
        "ethereum_pairs": {
          {% set all_hosts = (groups['ethereum_node'] | default([])) + (groups['bootnode'] | default([])) %}
          {% set valid_hosts = [] %}
          {% for host in all_hosts | sort %}
            {% if hostvars[host]['ethereum_node_cl'] is defined
               and hostvars[host]['ethereum_node_el'] is defined
               and hostvars[host]['ethereum_node_fact_discovery_cl_enr'] is defined
               and hostvars[host]['ethereum_node_fact_discovery_el_enode'] is defined %}
              {% set _ = valid_hosts.append(host) %}
            {% endif %}
          {% endfor %}
          {% for host in valid_hosts %}
            "{{ host }}": {
              "consensus": {
                "client": "{{ hostvars[host]['ethereum_node_cl'] }}",
                "image": "{{ hostvars[host][(hostvars[host]['ethereum_node_cl']) + '_container_image'] | default('') }}",
                "enr": "{{ hostvars[host]['ethereum_node_fact_discovery_cl_enr'] }}",
                "peer_id": "{{ hostvars[host]['ethereum_node_fact_discovery_cl_peer_id'] | default('') }}",
                "beacon_uri": "{{ 'https://' + hostvars[host]['ethereum_node_beacon_hostname']
                               if hostvars[host]['ethereum_node_beacon_hostname'] is defined else '' }}"
              },
              "execution": {
                "client": "{{ hostvars[host]['ethereum_node_el'] }}",
                "image": "{{ hostvars[host][(hostvars[host]['ethereum_node_el']) + '_container_image'] | default('') }}",
                "enode": "{{ hostvars[host]['ethereum_node_fact_discovery_el_enode'] }}",
                "rpc_uri": "{{ 'https://' + hostvars[host]['ethereum_node_rcp_hostname'] if hostvars[host]['ethereum_node_rcp_hostname'] is defined else '' }}"
              }
            }{% if not loop.last %},{% endif %}
          {% endfor %}
        }
      }

eth_inventory_web_nginx_config: | # noqa var-naming[no-role-prefix]
  server {
      listen       80;
      server_name  localhost;

      location / {
          if ($request_method = 'OPTIONS') {
              add_header 'Access-Control-Allow-Origin' '*';
              add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
              #
              # Custom headers and headers various browsers *should* be OK with but aren't
              #
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
              #
              # Tell client that this pre-flight info is valid for 20 days
              #
              add_header 'Access-Control-Max-Age' 1728000;
              add_header 'Content-Type' 'text/plain; charset=utf-8';
              add_header 'Content-Length' 0;
              return 204;
          }
          if ($request_method = 'POST') {
              add_header 'Access-Control-Allow-Origin' '*' always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
              add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
          }
          if ($request_method = 'GET') {
              add_header 'Access-Control-Allow-Origin' '*' always;
              add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
              add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
              add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
          }
          root   /usr/share/nginx/html;
          index  index.html index.htm;
      }

      error_page   500 502 503 504  /50x.html;
      location = /50x.html {
          root   /usr/share/nginx/html;
      }
  }
