- name: Validate prysm beacon extra args
  vars:
    prysm_reserved_flag_keys: >-
      {{
        (
          prysm_container_command_default +
          prysm_container_command_v6 +
          prysm_container_supernode_command +
          prysm_container_pprof_command +
          prysm_container_command_checkpoint_args +
          prysm_mev_boost_beacon_command
        ) | ethpandaops.general.command_flag_keys(prysm_container_command_pair_flags)
      }}
    prysm_container_conflicting_flags: >-
      {{
        prysm_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          prysm_container_command +
          (prysm_checkpoint_sync_enabled | ternary(prysm_container_command_checkpoint_args, [])) +
          (prysm_mev_boost_enabled | ternary(prysm_mev_boost_beacon_command, [])),
          prysm_container_command_pair_flags,
          prysm_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - prysm_container_conflicting_flags | length == 0
    fail_msg: >-
      prysm_container_command_extra_args redefines managed flags:
      {{ prysm_container_conflicting_flags | join(', ') }}.
      Configure these through prysm role variables instead of re-adding them in extra args.

- name: Validate prysm validator extra args
  when: prysm_validator_enabled
  vars:
    prysm_validator_reserved_flag_keys: >-
      {{
        (
          prysm_validator_container_command +
          prysm_mev_boost_validator_command
        ) | ethpandaops.general.command_flag_keys(prysm_validator_container_command_pair_flags)
      }}
    prysm_validator_conflicting_flags: >-
      {{
        prysm_validator_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          prysm_validator_container_command +
          (prysm_mev_boost_enabled | ternary(prysm_mev_boost_validator_command, [])),
          prysm_validator_container_command_pair_flags,
          prysm_validator_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - prysm_validator_conflicting_flags | length == 0
    fail_msg: >-
      prysm validator extra args redefine managed flags:
      {{ prysm_validator_conflicting_flags | join(', ') }}.
      Configure these through prysm validator vars instead of re-adding them in extra args.
