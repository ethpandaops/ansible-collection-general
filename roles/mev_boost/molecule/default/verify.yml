- name: Verify
  hosts: molecule
  vars:
    mev_boost_config_dir: /opt/mev_boost
    mev_boost_container_name: mev-boost
  tasks:
    - name: Wait and let the container start
      ansible.builtin.pause:
        seconds: 10

    - name: Wait for container to be in running state
      community.docker.docker_container_info:
        name: "{{ mev_boost_container_name }}"
      register: mev_boost_result_container
      until:
        - mev_boost_result_container.container.State.Running
        - not mev_boost_result_container.container.State.Restarting
      retries: 10
      delay: 3
      failed_when: false

    - name: Get final container info
      community.docker.docker_container_info:
        name: "{{ mev_boost_container_name }}"
      register: mev_boost_result_container

    - name: Show infos
      ansible.builtin.debug:
        var: "{{ item }}"
      loop:
        - mev_boost_result_container
    - name: Check if config file exists on host
      ansible.builtin.stat:
        path: "{{ mev_boost_config_dir }}/config.yaml"
      register: mev_boost_config_file
    - name: Display config file content
      ansible.builtin.command:
        cmd: "cat {{ mev_boost_config_dir }}/config.yaml"
      register: mev_boost_config_content
      changed_when: false
    - name: Show config content
      ansible.builtin.debug:
        msg: "{{ mev_boost_config_content.stdout }}"
    - name: Verify config file in container
      ansible.builtin.command:
        cmd: "docker exec {{ mev_boost_container_name }} cat /config.yaml"
      register: mev_boost_container_config
      changed_when: false
      when:
        - mev_boost_result_container.container.State.Running
        - not mev_boost_result_container.container.State.Restarting
    - name: Show container config
      ansible.builtin.debug:
        msg: "{{ mev_boost_container_config.stdout }}"
      when:
        - mev_boost_result_container.container.State.Running
        - not mev_boost_result_container.container.State.Restarting
        - mev_boost_container_config is defined

    - name: Get container logs
      ansible.builtin.command:
        cmd: "docker logs {{ mev_boost_container_name }}"
      register: mev_boost_container_logs
      changed_when: false

    - name: Show container logs
      ansible.builtin.debug:
        msg: "{{ mev_boost_container_logs.stderr }}"

    - name: Verify conflicting extra args are rejected
      block:
        - name: Run mev_boost role with conflicting extra args
          ansible.builtin.include_role:
            name: mev_boost
          vars:
            mev_boost_container_name: mev-boost-invalid
            mev_boost_config_dir: /opt/mev_boost-invalid
            mev_boost_container_ports: []
            mev_boost_config_enabled: true
            mev_boost_container_command_extra_args:
              - -relays=https://invalid.example

        - name: Fail if conflicting extra args were accepted
          ansible.builtin.fail:
            msg: "Role accepted conflicting extra args"
      rescue:
        - name: Save conflicting-extra-args failure
          ansible.builtin.set_fact:
            mev_boost_conflict_result: "{{ ansible_failed_result }}"

    - name: Assert results
      ansible.builtin.assert:
        that:
          - mev_boost_result_container.container.State.Running or mev_boost_result_container.container.State.Status == 'running'
          - not mev_boost_result_container.container.State.Restarting
          - mev_boost_config_file.stat.exists
          - "'timeout_get_header_ms: 900' in mev_boost_config_content.stdout"
          - "'late_in_slot_time_ms: 1800' in mev_boost_config_content.stdout"
          - "'0x845bd072b7cd566f02faeb0a4033ce9399e42839ced64e8b2adcfc859ed1e8e1a5a293336a49feac6d9a5edb779be53a' in mev_boost_config_content.stdout"
          - "'enable_timing_games: true' in mev_boost_config_content.stdout"
          - "'target_first_request_ms: 200' in mev_boost_config_content.stdout"
          - "'frequency_get_header_ms: 100' in mev_boost_config_content.stdout"
          - "'-config' in mev_boost_result_container.container.Config.Cmd"
          - "'/config.yaml' in mev_boost_result_container.container.Config.Cmd"
          - mev_boost_result_container.container.Config.Cmd | select('match', '^-relays=.*') | list | length == 0
          - mev_boost_conflict_result is defined
          - mev_boost_conflict_result.msg is search('redefines managed or incompatible flags')
          - mev_boost_conflict_result.msg is search('-relays')
        fail_msg: "❌ Container is not running properly or config is not correctly set. Check container logs above."
        success_msg: "✅ MEV-Boost container is running with config.yaml support!"
