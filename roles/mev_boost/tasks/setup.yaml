- name: Build mev_boost runtime vars
  ansible.builtin.set_fact:
    mev_boost_volumes: >-
      {{
        mev_boost_container_volumes +
        (mev_boost_config_enabled | ternary([mev_boost_config_dir + '/config.yaml:/config.yaml:ro'], []))
      }}
    mev_boost_managed_command: >-
      {{
        mev_boost_container_command +
        (mev_boost_config_enabled | ternary(['-config', '/config.yaml'], []))
      }}

- name: Validate mev_boost extra args
  vars:
    mev_boost_conflicting_flags: >-
      {{
        mev_boost_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          mev_boost_managed_command,
          mev_boost_container_command_pair_flags,
          (mev_boost_config_enabled | ternary(mev_boost_config_incompatible_flag_keys, []))
        )
      }}
  ansible.builtin.assert:
    that:
      - mev_boost_conflicting_flags | length == 0
    fail_msg: >-
      mev_boost_container_command_extra_args redefines managed or incompatible flags:
      {{ mev_boost_conflicting_flags | join(', ') }}.
      Configure these through mev_boost role variables instead of re-adding them in extra args.

- name: Add mev_boost user
  ansible.builtin.user:
    name: "{{ mev_boost_user }}"
  register: mev_boost_user_meta

- name: Setup docker network
  ansible.builtin.include_role:
    name: ethpandaops.general.docker_network
  vars:
    docker_network_name: "{{ mev_boost_docker_network_name }}"

- name: Create mev_boost config directory
  ansible.builtin.file:
    path: "{{ mev_boost_config_dir }}"
    state: directory
    owner: "{{ mev_boost_user }}"
    group: "{{ mev_boost_user }}"
    mode: '0750'
  when: mev_boost_config_enabled

- name: Create mev_boost config.yaml
  ansible.builtin.copy:
    content: "{{ mev_boost_config }}"
    dest: "{{ mev_boost_config_dir }}/config.yaml"
    owner: "{{ mev_boost_user }}"
    group: "{{ mev_boost_user }}"
    mode: '0640'
  when: mev_boost_config_enabled
  notify: Restart mev_boost container

- name: Set final mev_boost command
  ansible.builtin.set_fact:
    mev_boost_command: >-
      {{
        mev_boost_managed_command + mev_boost_container_command_extra_args
      }}

- name: Run mev_boost container
  community.docker.docker_container:
    name: "{{ mev_boost_container_name }}"
    image: "{{ mev_boost_container_image }}"
    image_name_mismatch: recreate
    state: started
    restart_policy: always
    stop_timeout: "{{ mev_boost_container_stop_timeout }}"
    volumes: "{{ mev_boost_volumes }}"
    env: "{{ mev_boost_container_env }}"
    networks: "{{ mev_boost_container_networks }}"
    ports: "{{ mev_boost_container_ports }}"
    command: "{{ mev_boost_command }}"
    user: "{{ mev_boost_user_meta.uid }}"
