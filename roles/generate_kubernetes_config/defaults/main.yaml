devnet_name: "template" # noqa var-naming[no-role-prefix]

primary_bootnode: "bootnode-1" # noqa var-naming[no-role-prefix]

gen_kubernetes_config_default_output_dir: ../kubernetes/{{ ethereum_network_name | replace(devnet_name + "-", '') }} # noqa var-naming[no-role-prefix]

cl_config_path: ../network-configs/{{ ethereum_network_name | replace(devnet_name + "-", '') }}/metadata/config.yaml # noqa var-naming[no-role-prefix]

gen_kubernetes_config_ethereum_node: # noqa var-naming[no-role-prefix]
  el: geth
  cl: prysm
  value: "001"

default_cl_endpoint: >- # noqa var-naming[no-role-prefix]
  http://{{ gen_kubernetes_config_ethereum_node.cl + '-' + gen_kubernetes_config_ethereum_node.el + '-' +
  gen_kubernetes_config_ethereum_node.value + ':' + ethereum_node_cl_ports_http_beacon | string }}
default_el_endpoint: >- # noqa var-naming[no-role-prefix]
  http://{{ gen_kubernetes_config_ethereum_node.el + '-' + gen_kubernetes_config_ethereum_node.cl + '-' +
  gen_kubernetes_config_ethereum_node.value + ':' + ethereum_node_el_ports_http_rpc | string }}
default_el_ws_endpoint: >- # noqa var-naming[no-role-prefix]
  ws://{{ gen_kubernetes_config_ethereum_node.el + '-' + gen_kubernetes_config_ethereum_node.cl + '-' +
  gen_kubernetes_config_ethereum_node.value + ':' + ethereum_node_el_ports_ws_rpc | string }}
default_el_auth_endpoint: >- # noqa var-naming[no-role-prefix]
  http://{{ gen_kubernetes_config_ethereum_node.el + '-' + gen_kubernetes_config_ethereum_node.cl + '-' +
  gen_kubernetes_config_ethereum_node.value + ':' + ethereum_node_el_ports_engine | string }}

gen_kubernetes_domain: "{{ domain | default('ethpandaops.io') }}" # noqa var-naming[no-role-prefix]

gen_kubernetes_config_helm_repositories: # noqa var-naming[no-role-prefix]
  - name: ethereum-helm-charts
    url: https://ethpandaops.github.io/ethereum-helm-charts
  - name: blobscan-helm-charts
    url: https://blobscan.github.io/blobscan-helm-charts/
  - name: blockscout-helm-charts
    url: https://blockscout.github.io/helm-charts
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: ethpandaops-general-helm-charts
    url: https://ethpandaops.github.io/general-helm-charts

gen_kubernetes_config_ethereum_node_name: >- # noqa var-naming[no-role-prefix] yaml[line-length]
  {{ gen_kubernetes_config_ethereum_node.cl }}-{{ gen_kubernetes_config_ethereum_node.el }}-{{ gen_kubernetes_config_ethereum_node.value }}

gen_kubernetes_config_dora_frontend_explorer_link: "https://explorer.{{ network_subdomain }}" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_frontend_rainbowkit_id: "" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_frontend_public_rpc: "https://rpc.{{ network_subdomain }}" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_snooper_port: false # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_genesis_config: "https://config.{{ network_subdomain }}/el/genesis.json" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_endpoints_url: "" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_consensus_endpoints_url: "" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_api_require_auth: false # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_api_whitelisted_ips: [] # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_indexer_enabled: true # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_indexer_traces: true # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_indexer_retention: "336h" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_execution_indexer_details_max_size: "100GB" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_postgres_size: >- # noqa var-naming[no-role-prefix]
  {{ "80Gi" if gen_kubernetes_config_dora_execution_indexer_enabled else "10Gi" }}
gen_kubernetes_config_dora_mev_relays: [] # noqa var-naming[no-role-prefix]
gen_kubernetes_config_dora_buildoor_overview_url: "https://buildoor.{{ network_subdomain }}" # noqa var-naming[no-role-prefix]

# authenticatoor configuration
gen_kubernetes_config_authenticatoor_cf_team_domain: "ethpandaops.cloudflareaccess.com" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_authenticatoor_cf_aud_tag: "" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_authenticatoor_persistence_size: "32Mi" # noqa var-naming[no-role-prefix]

# powfaucet configuration
# Multi-RPC endpoints — when non-empty, replaces the default single-bootnode RPC.
# Each entry: { url, name?, priority?, metered? }
gen_kubernetes_config_powfaucet_rpc_endpoints: [] # noqa var-naming[no-role-prefix]
# Authenticatoor login module on the faucet (uses the cluster-local authenticatoor service).
gen_kubernetes_config_powfaucet_authenticatoor_enabled: true # noqa var-naming[no-role-prefix]
# Default grants for authenticated users (evaluated in order; later grants override perks of earlier ones):
#   1. Baseline: 10x mining-reward factor for all logged-in users.
#   2. One free 100 ETH drop per day, no mining required (skips PoW + recurring/outflow limits).
gen_kubernetes_config_powfaucet_authenticatoor_grants: # noqa var-naming[no-role-prefix]
  - limitCount: 0
    limitAmount: 0
    duration: 86400
    rewardFactor: 10
  - limitCount: 1
    duration: 86400
    skipModules: ["pow", "recurring-limits", "faucet-outflow"]
    overrideMaxDrop: 100000000000000000000  # 100 ETH

# PandaMenu configuration
gen_kubernetes_config_pandamenu_enabled: true # noqa var-naming[no-role-prefix]
gen_kubernetes_config_pandamenu_script: '<script src="https://pandamenu.ethpandaops.io/panda-menu-1.0.1.js" integrity="sha384-icGX6g6CzB0tqlhDc6Su4c6IPVbcbUvfM3xjbbFYsYBwuZR79WkmOxDhGEPfmyn2" crossorigin="anonymous"></script>' # noqa var-naming[no-role-prefix] yaml[line-length]

gen_kubernetes_config_chat_image: "" # noqa var-naming[no-role-prefix]
gen_kubernetes_config_chat_llm_model: "claude-sonnet-4-6" # noqa var-naming[no-role-prefix]
# Cloudflare Access trusted-header SSO.
gen_kubernetes_config_chat_auth_enabled: true # noqa var-naming[no-role-prefix]


# Enabled charts configuration
gen_kubernetes_config_disabled_services: [] # noqa var-naming[no-role-prefix]
gen_kubernetes_config_enabled_charts: "{{ gen_kubernetes_config_helm_charts.keys() | reject('in', gen_kubernetes_config_disabled_services) | list }}" # noqa var-naming[no-role-prefix] yaml[line-length]

gen_kubernetes_config_helm_charts: # noqa var-naming[no-role-prefix]
  config:
    valuesTemplatePath: templates/config.yaml.j2
  checkpointz:
    valuesTemplatePath: templates/checkpointz.yaml.j2
    dependencies:
      - name: checkpointz
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.1.3
  dugtrio:
    valuesTemplatePath: templates/dugtrio.yaml.j2
    dependencies:
      - name: dugtrio
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.6
  faucet:
    valuesTemplatePath: templates/powfaucet.yaml.j2
    dependencies:
      - name: powfaucet
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 1.0.0
  forkmon:
    valuesTemplatePath: templates/forkmon.yaml.j2
    dependencies:
      - name: forkmon
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.1.5
  dora:
    valuesTemplatePath: templates/dora.yaml.j2
    additionalTemplates:
      "endpoints-cl.yaml": templates/dora-endpoints-cl.yaml.j2
      "endpoints-el.yaml": templates/dora-endpoints-el.yaml.j2
    dependencies:
      - name: dora
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 1.0.10
  chat: disabled for now — uncomment to enable (needs the chart published +
  services.enc.yaml#chat + a Cloudflare Access app on chat.<network_subdomain>).
  chat:
    valuesTemplatePath: templates/chat.yaml.j2
    dependencies:
      - name: panda-chat
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.1.1
  forky:
    valuesTemplatePath: templates/forky.yaml.j2
    dependencies:
      - name: forky
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.2.0
  homepage:
    valuesTemplatePath: templates/testnet-homepage.yaml.j2
    dependencies:
      - name: testnet-homepage
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.2.3
  assertoor:
    valuesTemplatePath: templates/assertoor.yaml.j2
    dependencies:
      - name: assertoor
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 1.2.0
  authenticatoor:
    valuesTemplatePath: templates/authenticatoor.yaml.j2
    dependencies:
      - name: authenticatoor
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.1.0
  buildoor:
    valuesTemplatePath: templates/buildoor.yaml.j2
    dependencies:
      - name: buildoor-overview
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.1
  tracoor:
    valuesTemplatePath: templates/tracoor.yaml.j2
    dependencies:
      - name: tracoor-single
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.5
  erpc:
    valuesTemplatePath: templates/erpc.yaml.j2
    dependencies:
      - name: erpc
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.4
  spamoor:
    valuesTemplatePath: templates/spamoor.yaml.j2
    dependencies:
      - name: spamoor
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 1.0.0
  xatu-cannon:
    valuesTemplatePath: templates/xatu-cannon.yaml.j2
    dependencies:
      - name: xatu-cannon
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.2.2
  xatu-mimicry:
    valuesTemplatePath: templates/xatu-mimicry.yaml.j2
    dependencies:
      - name: xatu-mimicry
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.7
  xatu-cl-mimicry:
    valuesTemplatePath: templates/xatu-cl-mimicry.yaml.j2
    dependencies:
      - name: xatu-cl-mimicry
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.2
  syncoor-server:
    valuesTemplatePath: templates/syncoor-server.yaml.j2
    dependencies:
      - name: syncoor-server
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.1
  syncoor-web:
    valuesTemplatePath: templates/syncoor-web.yaml.j2
    dependencies:
      - name: syncoor-web
        repository: https://ethpandaops.github.io/ethereum-helm-charts
        version: 0.0.1
  xatu-relay-monitor:
    valuesTemplatePath: templates/xatu-relay-monitor.yaml.j2
    dependencies:
      - name: xatu-relay-monitor
