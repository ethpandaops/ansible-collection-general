- name: Compute IPAM for the bridge
  # Docker's bridge driver only supports a single IPv6 subnet per network. When
  # a ULA private subnet is configured, that becomes the bridge's IPAM (Docker
  # auto-assigns from it). Public IPv6 addresses are injected per-container by
  # docker-public-ipv6-injector via the org.ethpandaops.public_ipv6 label, and
  # reachability is provided by ndppd plus the on-link bridge route.
  ansible.builtin.set_fact:
    docker_network_ipam_for_bridge: >-
      {{ [{'subnet': docker_network_ipv6_private_subnet,
            'gateway': docker_network_ipv6_private_gateway}]
         if (docker_network_enable_ipv6 | bool
             and (docker_network_ipv6_private_subnet | default('') | length > 0))
         else (docker_network_ipam_config | default([])) }}

- name: Setup NDP proxy for routed IPv6
  ansible.builtin.include_tasks: ndppd_setup.yaml
  when:
    - docker_network_enable_ipv6 | bool
    - >-
      docker_network_driver_options is mapping and
      docker_network_driver_options['com.docker.network.bridge.gateway_mode_ipv6']
      | default('') == 'routed'

- name: Create docker network
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    enable_ipv6: "{{ docker_network_enable_ipv6 }}"
    ipam_config: "{{ docker_network_ipam_for_bridge }}"
    driver_options: "{{ docker_network_driver_options | default(omit) }}"

- name: Setup persistent bridge IPv6 route fix
  when:
    - docker_network_enable_ipv6 | bool
    - (docker_network_ipv6_pool | default('') | length > 0)
      or (docker_network_ipv6_private_subnet | default('') | length > 0)
  block:
    - name: Get bridge interface name
      ansible.builtin.command: >-
        docker network inspect {{ docker_network_name }}
        --format '{{ '{{' }}.Id{{ '}}' }}'
      register: _docker_network_id
      changed_when: false

    - name: Set bridge route variables
      ansible.builtin.set_fact:
        docker_network_bridge_iface: "br-{{ _docker_network_id.stdout[:12] }}"
        # Public subnet = first IPv6 ipam entry that isn't the ULA private one.
        docker_network_bridge_public_subnet: >-
          {{ (docker_network_ipam_config | default([])
          | selectattr('subnet', 'defined')
          | selectattr('subnet', 'search', ':')
          | rejectattr('subnet', 'eq', docker_network_ipv6_private_subnet)
          | list
          | first
          | default({})).subnet | default('') }}

    - name: Install docker-ipv6-route-fix service
      ansible.builtin.template:
        src: docker-ipv6-route-fix.service.j2
        dest: /etc/systemd/system/docker-ipv6-route-fix.service
        mode: "0644"
      register: docker_network_route_fix_service

    - name: Install docker-ipv6-route-fix script
      ansible.builtin.template:
        src: docker-ipv6-route-fix.sh.j2
        dest: /usr/local/bin/docker-ipv6-route-fix.sh
        mode: "0755"
      register: docker_network_route_fix_script

    - name: Enable and start docker-ipv6-route-fix service
      ansible.builtin.systemd:
        name: docker-ipv6-route-fix
        daemon_reload: true
        enabled: true
        state: >-
          {{ 'restarted'
          if (docker_network_route_fix_service.changed
          or docker_network_route_fix_script.changed)
          else 'started' }}

- name: Setup docker-public-ipv6-injector
  when:
    - docker_network_enable_ipv6 | bool
    - docker_network_ipv6_private_subnet | default('') | length > 0
  block:
    - name: Install docker-public-ipv6-injector script
      ansible.builtin.template:
        src: docker-public-ipv6-injector.sh.j2
        dest: /usr/local/bin/docker-public-ipv6-injector.sh
        mode: "0755"
      register: docker_network_injector_script

    - name: Install docker-public-ipv6-injector service
      ansible.builtin.template:
        src: docker-public-ipv6-injector.service.j2
        dest: /etc/systemd/system/docker-public-ipv6-injector.service
        mode: "0644"
      register: docker_network_injector_service

    - name: Enable and start docker-public-ipv6-injector service
      ansible.builtin.systemd:
        name: docker-public-ipv6-injector
        daemon_reload: true
        enabled: true
        state: >-
          {{ 'restarted'
          if (docker_network_injector_script.changed
          or docker_network_injector_service.changed)
          else 'started' }}
