- name: Install ndppd
  ansible.builtin.package:
    name: ndppd
    state: present

- name: Enable IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    sysctl_set: true
    reload: true

- name: Keep accepting RAs with forwarding enabled
  ansible.posix.sysctl:
    name: "net.ipv6.conf.{{ docker_network_ndppd_interface | default(ansible_default_ipv6.interface | default('eth0')) }}.accept_ra"
    value: "2"
    sysctl_set: true
    reload: true

- name: Check if DOCKER-USER IPv6 ACCEPT rule exists
  ansible.builtin.command: ip6tables -C DOCKER-USER -j ACCEPT
  register: _docker_user_check
  changed_when: false
  failed_when: false

- name: Allow IPv6 forwarding through Docker DOCKER-USER chain
  ansible.builtin.command: ip6tables -I DOCKER-USER -j ACCEPT
  when: _docker_user_check.rc != 0
  changed_when: true

- name: Configure ndppd
  ansible.builtin.template:
    src: ndppd.conf.j2
    dest: /etc/ndppd.conf
    mode: "0644"
  notify: restart ndppd

- name: Enable and start ndppd
  ansible.builtin.service:
    name: ndppd
    state: started
    enabled: true
