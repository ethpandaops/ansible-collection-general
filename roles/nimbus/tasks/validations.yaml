- name: Build nimbus validator extra args
  ansible.builtin.set_fact:
    nimbus_validator_effective_extra_args: >-
      {{
        nimbus_validator_container_command_extra_args
        if nimbus_validator_container_command_extra_args | length > 0
        else ((not nimbus_enabled) | ternary(nimbus_container_command_extra_args, []))
      }}

- name: Validate nimbus beacon extra args
  vars:
    nimbus_reserved_flag_keys: >-
      {{
        (
          nimbus_container_command_default +
          nimbus_container_command_metrics +
          nimbus_container_command_v6 +
          nimbus_container_supernode_command +
          nimbus_validator_container_command_base +
          nimbus_validator_container_args +
          nimbus_mev_boost_beacon_command
        ) | ethpandaops.general.command_flag_keys(nimbus_container_command_pair_flags)
      }}
    nimbus_container_conflicting_flags: >-
      {{
        nimbus_container_command_extra_args | ethpandaops.general.command_conflicting_flags(
          nimbus_container_command +
          (nimbus_validator_enabled | ternary(nimbus_validator_container_args, [])) +
          (nimbus_mev_boost_enabled | ternary(nimbus_mev_boost_beacon_command, [])),
          nimbus_container_command_pair_flags,
          nimbus_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - nimbus_container_conflicting_flags | length == 0
    fail_msg: >-
      nimbus_container_command_extra_args redefines managed flags:
      {{ nimbus_container_conflicting_flags | join(', ') }}.
      Configure these through nimbus role variables instead of re-adding them in extra args.

- name: Validate nimbus validator extra args
  when: nimbus_validator_enabled
  vars:
    nimbus_reserved_flag_keys: >-
      {{
        (
          nimbus_container_command_default +
          nimbus_container_command_metrics +
          nimbus_container_command_v6 +
          nimbus_container_supernode_command +
          nimbus_validator_container_command_base +
          nimbus_validator_container_args +
          nimbus_mev_boost_beacon_command
        ) | ethpandaops.general.command_flag_keys(nimbus_validator_container_command_pair_flags)
      }}
    nimbus_validator_conflicting_flags: >-
      {{
        nimbus_validator_effective_extra_args | ethpandaops.general.command_conflicting_flags(
          nimbus_validator_container_command,
          nimbus_validator_container_command_pair_flags,
          nimbus_reserved_flag_keys
        )
      }}
  ansible.builtin.assert:
    that:
      - nimbus_validator_conflicting_flags | length == 0
    fail_msg: >-
      nimbus validator extra args redefine managed flags:
      {{ nimbus_validator_conflicting_flags | join(', ') }}.
      Use nimbus_container_command_extra_args for beacon-only flags and dedicated nimbus vars for managed settings.
