- name: "Run validator key generation"
  vars:
    ansible_connection: local
  delegate_to: 127.0.0.1
  run_once: true
  become: false
  block:
    - name: Create output directory for validator keys
      ansible.builtin.file:
        path: "{{ ethereum_genesis_validator_keys_output_dir }}"
        state: directory
        mode: "0755"

    - name: Create generic prysm wallet password file
      ansible.builtin.copy:
        content: "prysm"
        dest: "{{ ethereum_genesis_validator_keys_output_dir }}/prysm_wallet_pass.txt"
        mode: "0644"

    - name: Check if Docker is rootless
      ansible.builtin.command: docker info -f '{{ "{{json .SecurityOptions}}" }}'
      register: ethereum_genesis_docker_secopts
      changed_when: false

    - name: Set rootless fact
      ansible.builtin.set_fact:
        ethereum_genesis_docker_is_rootless: "{{ 'name=rootless' in ethereum_genesis_docker_secopts.stdout }}"

    - name: Compute docker user flag
      ansible.builtin.set_fact:
        ethereum_genesis_docker_user_flag: >-
          {{ ethereum_genesis_docker_is_rootless | ternary('', '-u ' ~ lookup('ansible.builtin.pipe', 'id -u')) }}

    - name: Set docker platform based on architecture
      ansible.builtin.set_fact:
        ethereum_genesis_docker_platform: "{{ 'linux/arm64' if ansible_architecture == 'aarch64' or ansible_architecture == 'arm64' else 'linux/amd64' }}"

    # Each generated key dir carries a .keyrange marker ("start-end"). If a
    # host's assigned range changed in the inventory (or the marker is missing,
    # e.g. keys generated before markers existed), drop the dir so the guarded
    # generation task below regenerates it. Regeneration is deterministic from
    # the mnemonic, so this is always safe locally.
    - name: Remove locally generated keys whose range changed
      loop: "{{ ethereum_genesis_validator_keyranges | dict2items }}"
      vars:
        ethereum_genesis_keydir: "{{ ethereum_genesis_validator_keys_output_dir }}/{{ item.key }}"
        ethereum_genesis_keyrange: "{{ item.value.start }}-{{ item.value.end }}"
      ansible.builtin.shell: >
        if [ -d "{{ ethereum_genesis_keydir }}" ] &&
           [ "$(cat "{{ ethereum_genesis_keydir }}/.keyrange" 2>/dev/null)" != "{{ ethereum_genesis_keyrange }}" ];
        then rm -rf "{{ ethereum_genesis_keydir }}" && echo removed; fi
      register: ethereum_genesis_stale_keys
      changed_when: "'removed' in ethereum_genesis_stale_keys.stdout"

    - name: Create validator keys
      loop: "{{ ethereum_genesis_validator_keyranges | dict2items }}"
      ansible.builtin.shell: >
        docker run --rm -t {{ ethereum_genesis_docker_user_flag }}
        --entrypoint eth2-val-tools
        --platform {{ ethereum_genesis_docker_platform }}
        -v {{ ethereum_genesis_validator_keys_output_dir }}:/output
        {{ ethereum_genesis_generator_container_image }}
        keystores
        --insecure
        --prysm-pass="prysm"
        --out-loc="/output/{{ item.key }}"
        --source-min="{{ item.value.start }}"
        --source-max="{{ item.value.end }}"
        --source-mnemonic="{{ ethereum_genesis_validator_mnemonic }}"
      args:
        creates: "{{ ethereum_genesis_validator_keys_output_dir }}/{{ item.key }}"

    - name: Record generated key range
      loop: "{{ ethereum_genesis_validator_keyranges | dict2items }}"
      ansible.builtin.copy:
        content: "{{ item.value.start }}-{{ item.value.end }}"
        dest: "{{ ethereum_genesis_validator_keys_output_dir }}/{{ item.key }}/.keyrange"
        mode: "0644"

    - name: Create bls address change operations
      when:
        - ethereum_genesis_validator_bls_change_operations_enabled
      loop: "{{ ethereum_genesis_validator_keyranges | dict2items }}"
      vars:
        genesis_validator_root: >-
          {{ (lookup('file', ethereum_genesis_generator_output_dir + '/parsed/parsedConsensusGenesis.json') | from_json).genesis_validators_root }}
        fork_version: >-
          {{ '%#x' % (lookup('file', ethereum_genesis_generator_output_dir + '/metadata/config.yaml') | from_yaml).GENESIS_FORK_VERSION }}
      ansible.builtin.shell: >
        docker run --rm -t {{ ethereum_genesis_docker_user_flag }}
        --entrypoint eth2-val-tools
        --platform {{ ethereum_genesis_docker_platform }}
        -v {{ ethereum_genesis_validator_keys_output_dir }}:/output
        {{ ethereum_genesis_generator_container_image }}
        bls-address-change
        --source-min="{{ item.value.start }}"
        --source-max="{{ item.value.end }}"
        --withdrawals-mnemonic="{{ ethereum_genesis_validator_mnemonic }}"
        --genesis-validators-root="{{ genesis_validator_root }}"
        --fork-version="{{ fork_version }}"
        --execution-address="{{ ethereum_genesis_validator_bls_change_execution_address }}"
        --as-json-list=true
        > "{{ ethereum_genesis_validator_keys_output_dir }}/{{ item.key }}/change_operations.json"
      args:
        creates: "{{ ethereum_genesis_validator_keys_output_dir }}/{{ item.key }}/change_operations.json"
